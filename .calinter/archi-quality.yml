archi_quality_dsl: "0.0.3"

metadata:
  title: Modelo de calidad ArchiMate
  author: Miguel Céspedes
  description: Agrupa reglas ejecutables en dimensiones de calidad para radar y dashboard.

qualityModel:
  scale:
    min: 0
    max: 100

  aggregation:
    mode: weightedAverage
    rounding: integer

  statusPolicy:
    pass:
      when: "score >= target and noCriticalFailures"
    warning:
      when: "score < target and noCriticalFailures"
    fail:
      when: "hasCriticalFailure"
    criticalSeverities:
      - error

  dimensions:
    estructura:
      label: Estructura
      target: 90
      rules:
        - id: carpetas_obligatorias_regla
          weight: 100

    nomenclatura:
      label: Nomenclatura
      target: 85
      rules:
        - id: nomenclatura_regla
          weight: 100

    integridad:
      label: Integridad
      target: 95
      rules:
        - id: referencias_rotas_regla
          weight: 100

    relaciones:
      label: Relaciones
      target: 80
      rules:
        - id: abuso_association_regla
          weight: 100

    trazabilidad:
      label: Trazabilidad
      target: 80
      rules:
        - id: elementos_aislados_regla
          weight: 100

    legibilidad:
      label: Legibilidad
      target: 80
      rules:
        - id: vistas_vacias_regla
          weight: 30
        - id: exceso_elementos_por_vista_regla
          weight: 35
        - id: exceso_relaciones_por_vista_regla
          weight: 35

name: Validate Archimate Source

on:
  workflow_call:
    inputs:
      source_path:
        description: Path to the source folder in the caller repository.
        required: false
        type: string
        default: "artifact/source"
    outputs:
      status:
        description: Validation status.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Validation report as JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate archimate source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout governance scripts
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - id: validate
        name: Validate source document
        shell: bash
        run: |
          report_file="$RUNNER_TEMP/archimate-source-report.json"
          status="$(node governance/scripts/validate-archimate-source.mjs --source-path "$SOURCE_PATH" --report-file "$report_file")"
          report="$(cat "$report_file")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'report<<EOF\n%s\nEOF\n' "$report" >> "$GITHUB_OUTPUT"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          SOURCE_PATH: ${{ inputs.source_path }}

name: Validate Archimate Source

on:
  workflow_call:
    inputs:
      source_path:
        description: Path to the source folder in the caller repository.
        required: false
        type: string
        default: "artifact/source"

jobs:
  validate:
    name: Validate archimate source
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Validate source document
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          source_path = Path(os.environ["SOURCE_PATH"])
          expected_file = source_path / "design.archimate"

          def local_name(tag: str) -> str:
              if "}" in tag:
                  return tag.rsplit("}", 1)[-1]
              return tag

          def is_archimate_model(text: str) -> bool:
              return "archimate" in text.lower()

          if not source_path.exists() or not source_path.is_dir():
              print(f"Source folder '{source_path}' is missing or not a directory.")
              sys.exit(1)

          visible_files = sorted([p for p in source_path.rglob("*") if p.is_file() and not any(part.startswith(".") for part in p.parts)])
          if visible_files != [expected_file]:
              print(f"Expected only '{expected_file}' under '{source_path}', found: {[str(p) for p in visible_files]}.")
              sys.exit(1)

          fail = False
          observations = []

          text = expected_file.read_text(encoding="utf-8", errors="replace")
          if not text.strip():
              fail = True
              observations.append(f"'{expected_file}' is empty.")
          elif not is_archimate_model(text):
              fail = True
              observations.append(f"'{expected_file}' is not an acceptable ArchiMate source file.")
          else:
              try:
                  root = ET.fromstring(text)
                  root_name = local_name(root.tag)
                  if root_name != "model":
                      fail = True
                      observations.append(f"'{expected_file}' does not have an ArchiMate model root element.")
              except Exception as exc:
                  fail = True
                  observations.append(f"XML parse failed for '{expected_file}': {exc}.")

          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/step-summary.md"))
          lines = []
          lines.append("| File | Status |")
          lines.append("|---|---|")
          status = "PASS" if not fail else "FAIL"
          lines.append(f"| `{expected_file.as_posix()}` | `{status}` |")
          lines.append("")
          lines.append(f"- Source folder: `{source_path}`")
          lines.append(f"- Overall: `{ 'FAIL' if fail else 'PASS' }`")
          if visible_files != [expected_file]:
              lines.append(f"- Observations: expected exactly one file named `design.archimate`.")
          if observations:
              lines.append("- Details:")
              for item in observations:
                  lines.append(f"  - {item}")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          if fail:
              sys.exit(1)
          PY
        env:
          SOURCE_PATH: ${{ inputs.source_path }}

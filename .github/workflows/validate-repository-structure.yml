name: Validate Repository Structure

on:
  workflow_call:
    inputs:
      repository_name_pattern:
        description: Regular expression for the caller repository name.
        required: false
        type: string
        default: "^(SBB-(SD|AM|BS)-[0-9]{4}|BS-[0-9]{4})$"
    outputs:
      status:
        description: Validation status.
        value: ${{ jobs.validate.outputs.status }}
      report:
        description: Validation report as JSON.
        value: ${{ jobs.validate.outputs.report }}

jobs:
  validate:
    name: Validate repository structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      status: ${{ steps.validate.outputs.status }}
      report: ${{ steps.validate.outputs.report }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout governance scripts
        uses: actions/checkout@v4
        with:
          repository: fad3dc07-e43b-4db5-92bd-fbfecbc5ae1b/ci-architecture-governance
          path: governance

      - id: validate
        name: Validate repository structure
        shell: bash
        run: |
          report_file="$RUNNER_TEMP/repository-structure-report.json"
          status="$(node governance/scripts/validate-repository-structure.mjs --repo-root "$GITHUB_WORKSPACE" --repository-name-pattern "$REPOSITORY_NAME_PATTERN" --report-file "$report_file")"
          report="$(cat "$report_file")"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"
          printf 'report<<EOF\n%s\nEOF\n' "$report" >> "$GITHUB_OUTPUT"
          if [ "$status" != "PASS" ]; then exit 1; fi
        env:
          REPOSITORY_NAME_PATTERN: ${{ inputs.repository_name_pattern }}

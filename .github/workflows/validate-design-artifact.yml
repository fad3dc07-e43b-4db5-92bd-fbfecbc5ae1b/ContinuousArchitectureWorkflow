name: Validate Design Artifact

on:
  workflow_call:
    inputs:
      artifact_path:
        description: Path to the artifact exchange folder in the caller repository.
        required: true
        type: string
      repository_name_pattern:
        description: Regular expression for the caller repository name.
        required: true
        type: string
      require_xml:
        description: Require the exchange artifact to be well-formed XML.
        required: false
        type: boolean
        default: true

jobs:
  validate:
    name: Validate artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Validate and summarize
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import re
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          artifact_path = Path(os.environ["ARTIFACT_PATH"])
          repository_name_pattern = os.environ["REPOSITORY_NAME_PATTERN"]
          require_xml = os.environ["REQUIRE_XML"].lower() == "true"
          repo_name = os.environ["GITHUB_REPOSITORY"].split("/")[-1]

          def detect_type(path: Path, text: str):
              suffix = path.suffix.lower()
              lowered = text.lower()
              if suffix == ".drawio" or "<mxfile" in lowered:
                  return "drawio"
              if suffix in {".md", ".markdown"}:
                  return "markdown"
              if suffix == ".archimate" or "archimate" in lowered or "<archimate:model" in lowered:
                  return "archimate-open-exchange"
              if suffix in {".bizzdesign", ".xmi"} or "bizzdesign" in lowered:
                  return "bizzdesign"
              if suffix == ".xml":
                  return "archimate-open-exchange" if "archimate" in lowered else "unknown"
              return "unknown"

          def first_heading_markdown(text: str):
              for line in text.splitlines():
                  if line.lstrip().startswith("#"):
                      return True
              return False

          def root_name(xml_text: str):
              root = ET.fromstring(xml_text)
              if "}" in root.tag:
                  return root.tag.rsplit("}", 1)[-1], root
              return root.tag, root

          report = {
              "repo": {
                  "name": repo_name,
                  "status": "UNKNOWN",
                  "sources_analyzed": 0,
                  "sources": [],
              },
              "summary": {"pass": 0, "warn": 0, "fail": 0, "skip": 0, "unknown": 0},
              "exchange": {"path": str(artifact_path), "status": "UNKNOWN"},
              "overall_observations": [],
          }

          repo_ok = re.fullmatch(repository_name_pattern, repo_name) is not None
          if not repo_ok:
              report["overall_observations"].append(f"Repository name '{repo_name}' does not match '{repository_name_pattern}'.")

          if not artifact_path.exists():
              report["exchange"]["status"] = "FAIL"
              report["overall_observations"].append(f"Exchange path '{artifact_path}' does not exist.")
          elif not artifact_path.is_dir():
              report["exchange"]["status"] = "FAIL"
              report["overall_observations"].append(f"Exchange path '{artifact_path}' is not a directory.")
          else:
              exchange_files = sorted([p for p in artifact_path.rglob("*") if p.is_file() and not any(part.startswith(".") for part in p.parts)])
              exchange_file = None
              for candidate in exchange_files:
                  if candidate.suffix.lower() == ".xml":
                      exchange_file = candidate
                      break
              if exchange_file is None and exchange_files:
                  exchange_file = exchange_files[0]
              if exchange_file is None:
                  report["exchange"]["status"] = "FAIL"
                  report["overall_observations"].append(f"No exchange file found under '{artifact_path}'.")
              else:
                  exchange_text = exchange_file.read_text(encoding="utf-8", errors="replace")
                  if not exchange_text.strip():
                      report["exchange"]["status"] = "FAIL"
                      report["overall_observations"].append(f"Exchange file '{exchange_file}' is empty.")
                  elif require_xml:
                      try:
                          root_tag, _ = root_name(exchange_text)
                          report["exchange"]["status"] = "PASS"
                          report["overall_observations"].append(f"Exchange XML root: {root_tag}.")
                      except Exception as exc:
                          report["exchange"]["status"] = "FAIL"
                          report["overall_observations"].append(f"Exchange XML is not well formed: {exc}.")
                  else:
                      report["exchange"]["status"] = "PASS"

          source_path = artifact_path.parent / "source"
          if source_path.exists() and source_path.is_dir():
              source_files = sorted([p for p in source_path.rglob("*") if p.is_file() and not any(part.startswith(".") for part in p.parts)])
          else:
              source_files = []
              report["overall_observations"].append(f"Source folder '{source_path}' is missing or not a directory.")

          for file_path in source_files:
              text = file_path.read_text(encoding="utf-8", errors="replace")
              detected_type = detect_type(file_path, text)
              checks = {"exists": "PASS", "non_empty": "PASS" if text.strip() else "FAIL", "well_formed": "SKIP", "type_specific": []}
              observations = []
              source_status = "UNKNOWN"

              if not text.strip():
                  source_status = "FAIL"
                  observations.append("File is empty.")
              elif detected_type == "drawio":
                  checks["well_formed"] = "PASS"
                  try:
                      root_tag, root = root_name(text)
                      checks["type_specific"].append({"name": "mxfile_root", "status": "PASS" if root_tag == "mxfile" else "FAIL", "detail": root_tag})
                      checks["type_specific"].append({"name": "diagram_present", "status": "PASS" if len(root.findall("diagram")) > 0 else "FAIL", "detail": str(len(root.findall("diagram")))})
                      source_status = "PASS" if all(item["status"] == "PASS" for item in checks["type_specific"]) else "WARN"
                  except Exception as exc:
                      checks["well_formed"] = "FAIL"
                      source_status = "FAIL"
                      observations.append(f"XML parse failed: {exc}.")
              elif detected_type == "archimate-open-exchange":
                  try:
                      root_tag, root = root_name(text)
                      checks["well_formed"] = "PASS"
                      checks["type_specific"].append({"name": "archimate_root", "status": "PASS" if "model" in root_tag.lower() else "FAIL", "detail": root_tag})
                      namespace_ok = "archimate" in text.lower()
                      checks["type_specific"].append({"name": "namespace_present", "status": "PASS" if namespace_ok else "FAIL", "detail": "archimate namespace detected" if namespace_ok else "missing archimate namespace"})
                      source_status = "PASS" if all(item["status"] == "PASS" for item in checks["type_specific"]) else "WARN"
                  except Exception as exc:
                      checks["well_formed"] = "FAIL"
                      source_status = "FAIL"
                      observations.append(f"XML parse failed: {exc}.")
              elif detected_type == "markdown":
                  checks["well_formed"] = "PASS"
                  heading_ok = first_heading_markdown(text)
                  checks["type_specific"].append({"name": "heading_present", "status": "PASS" if heading_ok else "WARN", "detail": "markdown heading found" if heading_ok else "no markdown heading"})
                  source_status = "PASS" if heading_ok else "WARN"
              elif detected_type == "bizzdesign":
                  checks["well_formed"] = "WARN"
                  checks["type_specific"].append({"name": "bizzdesign_detected", "status": "WARN", "detail": "heuristic only"})
                  source_status = "WARN"
                  observations.append("Bizzdesign detection is heuristic only.")
              else:
                  source_status = "FAIL"
                  checks["well_formed"] = "FAIL"
                  observations.append("Unsupported or unknown source type.")

              if checks["non_empty"] == "FAIL":
                  source_status = "FAIL"

              report["repo"]["sources"].append({
                  "path": str(file_path.relative_to(source_path)),
                  "detected_type": detected_type,
                  "status": source_status,
                  "checks": checks,
                  "observations": observations,
              })

          report["repo"]["sources_analyzed"] = len(report["repo"]["sources"])

          counts = {"PASS": 0, "WARN": 0, "FAIL": 0, "SKIP": 0, "UNKNOWN": 0}
          for source in report["repo"]["sources"]:
              counts[source["status"]] = counts.get(source["status"] , 0) + 1
          if report["exchange"]["status"] in counts:
              counts[report["exchange"]["status"]] += 1

          for key in ["PASS", "WARN", "FAIL", "SKIP", "UNKNOWN"]:
              report["summary"][key.lower()] = counts[key]

          if report["exchange"]["status"] == "FAIL" or any(source["status"] == "FAIL" for source in report["repo"]["sources"]):
              report["repo"]["status"] = "FAIL"
          elif not repo_ok:
              report["repo"]["status"] = "FAIL"
          elif report["exchange"]["status"] == "WARN" or any(source["status"] == "WARN" for source in report["repo"]["sources"]):
              report["repo"]["status"] = "WARN"
          elif report["exchange"]["status"] == "PASS" and all(source["status"] == "PASS" for source in report["repo"]["sources"]):
              report["repo"]["status"] = "PASS"
          else:
              report["repo"]["status"] = "UNKNOWN"

          summary_path = Path(os.environ.get("GITHUB_STEP_SUMMARY", "/tmp/step-summary.md"))
          report_path = Path(os.environ.get("RUNNER_TEMP", "/tmp")) / "design-governance-report.json"
          report_path.write_text(json.dumps(report, indent=2), encoding="utf-8")

          lines = []
          lines.append("| File | Type | Status | Observations |")
          lines.append("|---|---|---|---|")
          for source in report["repo"]["sources"]:
              obs = "; ".join(source["observations"]) if source["observations"] else "OK"
              lines.append(f"| `{source['path']}` | `{source['detected_type']}` | `{source['status']}` | {obs} |")
          lines.append("")
          lines.append(f"- Repository: `{repo_name}`")
          lines.append(f"- Repository name check: `{'PASS' if repo_ok else 'FAIL'}`")
          lines.append(f"- Exchange: `{report['exchange']['status']}`")
          lines.append(f"- Overall: `{report['repo']['status']}`")
          if report["overall_observations"]:
              lines.append("- Observations:")
              for item in report["overall_observations"]:
                  lines.append(f"  - {item}")
          summary_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          print(f"Wrote report to {report_path}")
          print(f"Wrote summary to {summary_path}")

          if report["repo"]["status"] == "FAIL":
              sys.exit(1)
          PY
        env:
          ARTIFACT_PATH: ${{ inputs.artifact_path }}
          REPOSITORY_NAME_PATTERN: ${{ inputs.repository_name_pattern }}
          REQUIRE_XML: ${{ inputs.require_xml }}
